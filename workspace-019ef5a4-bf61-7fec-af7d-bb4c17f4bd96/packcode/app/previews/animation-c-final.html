<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PackCode — Animation C: Wax Seal → Cascade (Final)</title>
<style>
  /* === COGNAC NOIR PALETTE === */
  :root {
    --bg: #14110D;
    --bg-2: #1A1611;
    --surface: #1F1A14;
    --surface-2: #25201A;
    --card: #2A2520;
    --border: #3D3528;
    --border-strong: #5A4F3A;

    --text: #EDE4D3;
    --text-2: #C8BCA0;
    --text-3: #8F8470;
    --text-4: #5D5443;

    --accent: #B8763D;
    --accent-hover: #D08A4E;
    --accent-glow: rgba(184, 118, 61, 0.4);
    --accent-soft: rgba(184, 118, 61, 0.10);
    --accent-border: rgba(184, 118, 61, 0.30);
    --accent-ink: #14110D;

    --success: #8FA078;

    --font-display: "Tiempos Headline", "Iowan Old Style", "Georgia", serif;
    --font-sans: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-sans); font-size: 15px; line-height: 1.55;
    min-height: 100vh; -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* =====================================================
     INTRO LAYER — the morphing seal lives here
     ===================================================== */
  .intro-layer {
    position: fixed; inset: 0; z-index: 80;
    pointer-events: none;
  }
  /* Dark wash that fades */
  .intro-wash {
    position: absolute; inset: 0;
    background: var(--bg);
    animation: washFade 0.5s ease 1.05s forwards;
  }
  @keyframes washFade { to { opacity: 0; } }

  /* The seal — starts in screen centre, morphs to header position */
  .seal {
    position: absolute;
    top: 50%; left: 50%;
    width: 88px; height: 88px;
    border: 2px solid var(--accent);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-sans);
    font-weight: 600; font-size: 38px;
    color: var(--accent);
    background: var(--bg);
    transform: translate(-50%, -50%) scale(0.4);
    opacity: 0;
    filter: blur(8px);
    animation:
      sealAppear   0.8s cubic-bezier(.16,.84,.3,1) 0.05s forwards,
      sealFlash    0.5s ease 0.75s,
      sealMorph    0.95s cubic-bezier(.7,0,.3,1) 1.15s forwards;
  }
  @keyframes sealAppear {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.4); filter: blur(8px); box-shadow: 0 0 0 0 var(--accent-glow); }
    70%  { opacity: 1; transform: translate(-50%, -50%) scale(1.04); filter: blur(0); box-shadow: 0 0 0 0 var(--accent-glow); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0); box-shadow: 0 0 40px 4px var(--accent-glow); }
  }
  @keyframes sealFlash {
    0%   { box-shadow: 0 0 40px 4px var(--accent-glow); }
    50%  { box-shadow: 0 0 80px 18px rgba(208, 138, 78, 0.6); }
    100% { box-shadow: 0 0 40px 4px var(--accent-glow); }
  }
  /* Morph: centre → top-left header position; 88px → 28px; rounded square → small mark */
  @keyframes sealMorph {
    0% {
      top: 50%; left: 50%;
      width: 88px; height: 88px;
      font-size: 38px; border-radius: 14px;
      transform: translate(-50%, -50%) scale(1);
      box-shadow: 0 0 40px 4px var(--accent-glow);
    }
    100% {
      top: 22px; left: 36px;
      width: 28px; height: 28px;
      font-size: 13px; border-radius: 6px;
      transform: translate(0, 0) scale(1);
      box-shadow: 0 0 0 0 transparent;
    }
  }

  /* The "ring" pulse — gold halo expanding outward */
  .seal-ring {
    position: absolute; top: 50%; left: 50%;
    width: 88px; height: 88px;
    border: 1px solid var(--accent);
    border-radius: 18px;
    transform: translate(-50%, -50%) scale(1);
    opacity: 0;
    animation: ringPulse 1.1s ease 0.55s;
  }
  @keyframes ringPulse {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.96); }
    40%  { opacity: 0.65; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.55); }
  }

  /* The "PackCode" label that briefly appears under the seal */
  .seal-label {
    position: absolute;
    top: calc(50% + 70px); left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-display);
    font-size: 19px; color: var(--text);
    letter-spacing: 0.03em;
    opacity: 0;
    animation:
      labelIn   0.5s ease 0.8s forwards,
      labelOut  0.4s ease 1.15s forwards;
  }
  @keyframes labelIn   { to { opacity: 1; transform: translateX(-50%) translateY(0); } from { opacity: 0; transform: translateX(-50%) translateY(8px); } }
  @keyframes labelOut  { to { opacity: 0; transform: translateX(-50%) translateY(-4px); } }

  /* After morph done, kill the whole intro layer so it doesn't block hover */
  .intro-layer.gone { display: none; }

  /* =====================================================
     HEADER (real one — sits beneath intro layer)
     ===================================================== */
  header {
    padding: 22px 36px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid transparent;
    background: var(--bg); position: sticky; top: 0; z-index: 20;
    height: 72px;
  }
  .brand {
    display: inline-flex; align-items: center; gap: 12px;
    font-family: var(--font-display); font-weight: 500; font-size: 19px;
    color: var(--text);
  }
  /* The real header brand mark — invisible until the morph lands on it */
  .brand-mark {
    width: 28px; height: 28px;
    border: 1px solid var(--accent); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-sans); font-weight: 600; font-size: 13px;
    color: var(--accent); background: var(--bg);
    opacity: 0;
    transition: box-shadow .3s, transform .3s;
  }
  .brand-mark.lit { opacity: 1; }
  .brand:hover .brand-mark {
    box-shadow: 0 0 18px var(--accent-glow);
    transform: translateY(-1px);
  }
  /* The "PackCode" wordmark in header fades in just before morph completes */
  .brand-name {
    opacity: 0; transition: opacity .4s ease;
  }
  .brand-name.lit { opacity: 1; }

  .nav-right {
    display: flex; gap: 4px; align-items: center;
    opacity: 0; animation: fadeIn 0.5s ease 1.9s forwards;
  }
  .nav-link {
    padding: 8px 14px; border-radius: 8px;
    font-size: 13.5px; color: var(--text-2);
    cursor: pointer; background: none; border: none;
    transition: all .15s;
  }
  .nav-link:hover { background: var(--surface-2); color: var(--text); }

  /* =====================================================
     HOME
     ===================================================== */
  #home {
    display: flex; flex-direction: column; align-items: center;
    padding: 56px 24px 80px;
    min-height: calc(100vh - 80px);
  }
  .home-inner {
    width: 100%; max-width: 1100px;
    display: flex; flex-direction: column; align-items: center;
  }

  /* Hero content fades up as morph nears completion */
  .greeting {
    font-family: var(--font-display);
    font-weight: 400; font-size: clamp(40px, 6vw, 58px);
    line-height: 1.02; letter-spacing: -0.02em;
    text-align: center; margin-bottom: 14px;
    color: var(--text);
    opacity: 0; filter: blur(10px); transform: translateY(10px);
    animation: heroIn 0.8s cubic-bezier(.2,.8,.3,1) 1.7s forwards;
  }
  .greeting .accent { color: var(--accent); font-style: italic; }
  .greeting .accent-dot { color: var(--accent); }

  .sub {
    font-size: 15px; color: var(--text-3);
    text-align: center; margin-bottom: 44px;
    max-width: 540px; line-height: 1.6;
    opacity: 0; animation: riseIn 0.6s ease 1.95s forwards;
  }
  @keyframes heroIn { to { opacity: 1; filter: blur(0); transform: translateY(0); } }
  @keyframes riseIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { to { opacity: 1; } }

  /* =====================================================
     TRIPTYCH LAYOUT
     ===================================================== */
  .triptych {
    display: grid;
    grid-template-columns: 1fr 540px 1fr;
    gap: 20px; align-items: start;
    width: 100%; max-width: 1100px;
  }
  @media (max-width: 980px) { .triptych { grid-template-columns: 1fr; gap: 16px; } }
  .wing { display: flex; flex-direction: column; gap: 12px; padding-top: 22px; }

  .qs {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 18px;
    cursor: pointer; text-align: left;
    transition: border-color .3s, transform .3s, box-shadow .3s, background .3s;
    display: flex; flex-direction: column; gap: 8px;
    position: relative; overflow: hidden;

    opacity: 0;
    /* slide in from outside */
  }
  .wing.left .qs  { transform: translateX(-32px) rotate(-1deg); animation: cardInLeft  0.7s cubic-bezier(.2,.8,.3,1) forwards; }
  .wing.right .qs { transform: translateX( 32px) rotate( 1deg); animation: cardInRight 0.7s cubic-bezier(.2,.8,.3,1) forwards; }
  @keyframes cardInLeft  { to { opacity: 1; transform: translateX(0) rotate(0deg); } }
  @keyframes cardInRight { to { opacity: 1; transform: translateX(0) rotate(0deg); } }

  .qs::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at center, var(--accent-glow), transparent 60%);
    opacity: 0; transition: opacity .4s;
    pointer-events: none;
  }
  .qs:hover {
    border-color: var(--accent);
    transform: translateY(-2px) translateX(0) rotate(0deg);
    box-shadow: 0 14px 40px rgba(0,0,0,0.4), 0 0 24px var(--accent-glow);
  }
  .qs:hover::before { opacity: 0.15; }

  .qs-icon { width: 22px; height: 22px; color: var(--accent); transition: transform .3s; }
  .qs:hover .qs-icon { transform: scale(1.1) rotate(-2deg); }
  .qs-icon svg { width: 20px; height: 20px; stroke-width: 1.5; }
  .qs-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .qs-desc { font-size: 12px; color: var(--text-3); line-height: 1.45; }

  /* =====================================================
     COMPOSER
     ===================================================== */
  .composer {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: 0 1px 1px rgba(0,0,0,0.4), 0 8px 30px rgba(0,0,0,0.25);
    overflow: hidden;
    transition: border-color .3s, box-shadow .3s;
    opacity: 0; transform: translateY(20px) scale(0.97);
    animation: composerIn 0.8s cubic-bezier(.2,.8,.3,1) 2.05s forwards;
  }
  @keyframes composerIn { to { opacity: 1; transform: translateY(0) scale(1); } }
  .composer:focus-within {
    border-color: var(--accent);
    box-shadow: 0 1px 1px rgba(0,0,0,0.4), 0 8px 36px var(--accent-glow);
  }
  .composer-input-wrap { padding: 22px 26px 6px; }
  textarea.composer-input {
    width: 100%; min-height: 76px; max-height: 280px;
    border: none; background: transparent;
    color: var(--text); outline: none;
    font-size: 16px; line-height: 1.55; resize: none;
    font-family: var(--font-sans);
  }
  textarea.composer-input::placeholder { color: var(--text-4); }

  .composer-toolbar {
    display: flex; align-items: center; gap: 4px;
    padding: 10px 16px 16px;
  }
  .tool-btn {
    background: none; border: none;
    width: 36px; height: 36px; border-radius: 10px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-3); transition: all .25s;
  }
  .tool-btn:hover {
    background: var(--surface-2); color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent-border), 0 0 14px var(--accent-glow);
  }
  .tool-btn svg { width: 17px; height: 17px; stroke-width: 1.6; }
  .composer-spacer { flex: 1; }
  .keyboard-hint {
    font-size: 11px; color: var(--text-4);
    margin-right: 10px; font-family: var(--font-mono);
    display: inline-flex; gap: 3px;
  }
  .keyboard-hint kbd {
    padding: 1px 5px; border-radius: 4px;
    background: var(--surface-2); border: 1px solid var(--border);
    font-family: inherit; font-size: 10px; color: var(--text-3);
    min-width: 16px; text-align: center;
  }
  .send-btn {
    background: var(--accent); color: var(--accent-ink);
    border: none; width: 38px; height: 38px; border-radius: 10px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .2s;
  }
  .send-btn:hover {
    background: var(--accent-hover); transform: translateY(-1px);
    box-shadow: 0 6px 20px var(--accent-glow);
  }
  .send-btn svg { width: 16px; height: 16px; stroke-width: 2.2; }

  /* =====================================================
     PILLS BELOW
     ===================================================== */
  .below {
    margin-top: 26px; display: flex; flex-direction: column; align-items: center; gap: 8px;
    opacity: 0; animation: fadeIn 0.6s ease 2.5s forwards;
  }
  .pill-label {
    font-size: 10.5px; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.14em;
    font-weight: 500;
  }
  .pill-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .pill {
    background: transparent; border: 1px solid var(--border);
    padding: 7px 14px; border-radius: 100px;
    cursor: pointer; font-size: 13px; color: var(--text-2);
    transition: all .2s;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .pill:hover {
    border-color: var(--accent); color: var(--text);
    box-shadow: 0 0 14px var(--accent-glow);
  }
  .pill.active {
    background: var(--accent); color: var(--accent-ink);
    border-color: var(--accent);
  }
  .pill-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-4);
  }
  .pill.active .pill-dot { background: var(--accent-ink); }

  /* =====================================================
     REPLAY BUTTON
     ===================================================== */
  .replay {
    position: fixed; bottom: 16px; right: 16px;
    background: var(--surface); color: var(--text-2);
    border: 1px solid var(--border); border-radius: 100px;
    padding: 8px 16px; font-size: 12px; cursor: pointer;
    font-family: var(--font-sans);
    transition: all .2s; z-index: 50;
  }
  .replay:hover { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<!-- ===============================================================
     INTRO LAYER — sits ON TOP, holds the morphing seal
     =============================================================== -->
<div class="intro-layer" id="introLayer">
  <div class="intro-wash"></div>
  <div class="seal-ring"></div>
  <div class="seal">P</div>
  <div class="seal-label">PackCode</div>
</div>

<!-- ===============================================================
     REAL HEADER
     =============================================================== -->
<header>
  <a href="#" class="brand">
    <div class="brand-mark" id="brandMark">P</div>
    <span class="brand-name" id="brandName">PackCode</span>
  </a>
  <div class="nav-right">
    <a class="nav-link">About</a>
    <button class="nav-link">New prompt</button>
  </div>
</header>

<section id="home">
  <div class="home-inner">
    <h1 class="greeting">Ready when you<span class="accent">'re</span> are<span class="accent-dot">.</span></h1>
    <p class="sub">Describe what you want — attach a file or repository if it helps. PackCode turns it into a token-efficient prompt for your chosen AI.</p>

    <div class="triptych">
      <!-- LEFT -->
      <div class="wing left">
        <button class="qs" style="animation-delay: 1.8s;">
          <span class="qs-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg></span>
          <div class="qs-title">Build it</div>
          <div class="qs-desc">Get a complete implementation</div>
        </button>
        <button class="qs" style="animation-delay: 2.0s;">
          <span class="qs-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l1.6 4.4 4.4 1.6-4.4 1.6L12 14l-1.6-4.4L6 8l4.4-1.6L12 2zM20 14l.8 2.2 2.2.8-2.2.8L20 20l-.8-2.2-2.2-.8 2.2-.8L20 14z"/></svg></span>
          <div class="qs-title">Refactor</div>
          <div class="qs-desc">Clean it up, same behaviour</div>
        </button>
      </div>

      <!-- COMPOSER -->
      <div class="composer">
        <div class="composer-input-wrap">
          <textarea class="composer-input" rows="2" placeholder="Make me a flappy-bird clone in Python. Or paste an article to summarise…"></textarea>
        </div>
        <div class="composer-toolbar">
          <button class="tool-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg></button>
          <button class="tool-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></button>
          <button class="tool-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg></button>
          <div class="composer-spacer"></div>
          <span class="keyboard-hint"><kbd>⌘</kbd><kbd>↵</kbd></span>
          <button class="send-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="wing right">
        <button class="qs" style="animation-delay: 1.9s;">
          <span class="qs-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="6" width="8" height="14" rx="4"/><path d="M19 7l-3 2M5 7l3 2M19 13h-3M8 13H5M19 19l-3-1.6M5 19l3-1.6M12 2v4"/></svg></span>
          <div class="qs-title">Find bugs</div>
          <div class="qs-desc">Just bugs, with fixes</div>
        </button>
        <button class="qs" style="animation-delay: 2.1s;">
          <span class="qs-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          <div class="qs-title">Code review</div>
          <div class="qs-desc">Issues sorted by severity</div>
        </button>
      </div>
    </div>

    <div class="below">
      <div class="pill-label">For</div>
      <div class="pill-row">
        <button class="pill active"><span class="pill-dot"></span>Claude Sonnet 4.5</button>
        <button class="pill"><span class="pill-dot"></span>GPT-5</button>
        <button class="pill"><span class="pill-dot"></span>Gemini 2.5 Pro</button>
        <button class="pill"><span class="pill-dot"></span>Grok 4</button>
      </div>
    </div>
  </div>
</section>

<button class="replay" onclick="location.reload()">↻ Replay intro</button>

<script>
  // Light up the real header mark + wordmark just as the morph lands there
  setTimeout(() => document.getElementById('brandMark').classList.add('lit'), 2050);
  setTimeout(() => document.getElementById('brandName').classList.add('lit'), 2150);
  // After morph + reveal done, remove the intro layer entirely (so it stops blocking pointer events)
  setTimeout(() => document.getElementById('introLayer').classList.add('gone'), 2300);
</script>
</body>
</html>
